---
name: Continuous Integration Workflow

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]
    merge_group:

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    install:
        name: Install Dependencies
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup

    compile:
        name: Typescript compilation
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["install"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - name: Compile
              run: "npm run compile"
            - name: Archive artifacts
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: build-artifacts-node-${{ matrix.node-version }}
                  path: target/build/**/*

    static-code-analysis:
        name: Static Code Analysis
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["install"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - name: Run linters
              run: "npm run lint"

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["compile", "static-code-analysis"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build-artifacts-node-${{ matrix.node-version }}
                  path: target/build
            - name: Modify AppArmor Settings
              run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
            - name: Run unit tests
              run: "unshare --map-root-user -n npm run test:unit:with-coverage"

    type-tests:
        name: Type Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["compile", "static-code-analysis"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - name: Run type tests
              run: "npm run test:types"

    integration-tests:
        name: Integration Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["compile", "static-code-analysis"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: build-artifacts-node-${{ matrix.node-version }}
                  path: target/build
            - name: Run integration tests
              run: "npm run test:integration"

    workflow-security:
        name: Workflow Security Analysis
        runs-on: ubuntu-latest
        permissions:
            contents: read # required for actions/checkout to read the workflow source
            security-events: write # required by zizmor-action to upload SARIF to code scanning
        steps:
            - name: Checkout git repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Run zizmor
              id: zizmor
              uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
              with:
                  version: 1.25.2
                  persona: pedantic
                  min-severity: informational
                  min-confidence: low
                  config: .github/zizmor.yml
            - name: Fail if zizmor reported findings
              env:
                  SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
              run: |
                  count="$(jq '[.runs[].results[]] | length' "$SARIF_FILE")"
                  echo "zizmor findings: $count"
                  test "$count" -eq 0
