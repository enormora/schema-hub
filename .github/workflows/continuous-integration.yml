---
name: Continuous Integration Workflow

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]
    merge_group:

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    install:
        name: Install Dependencies
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup

    compile:
        name: Typescript compilation
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["install"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - name: Compile
              run: "npm run compile"
            - name: Archive artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: build-artifacts-node-${{ matrix.node-version }}
                  path: target/build/**/*

    static-code-analysis:
        name: Static Code Analysis
        runs-on: ubuntu-latest
        permissions:
            contents: read
        needs: ["install"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - name: Run linters
              run: "npm run lint"

    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["compile", "static-code-analysis"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: build-artifacts-node-${{ matrix.node-version }}
                  path: target/build
            - name: Modify AppArmor Settings
              run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
            - name: Run unit tests
              run: "unshare --map-root-user -n npm run test:unit:with-coverage"

    type-tests:
        name: Type Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        needs: ["compile", "static-code-analysis"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - name: Run type tests
              run: "npm run test:types"

    integration-tests:
        name: Integration Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        needs: ["compile", "static-code-analysis"]
        steps:
            - name: Checkout git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup
            - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  name: build-artifacts-node-${{ matrix.node-version }}
                  path: target/build
            - name: Run integration tests
              run: "npm run test:integration"

    workflow-security:
        name: Workflow Security Analysis
        runs-on: ubuntu-latest
        permissions:
            contents: read # required for actions/checkout to read the workflow source
            security-events: write # required by zizmor-action to upload SARIF to code scanning
        steps:
            - name: Checkout git repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Run zizmor
              id: zizmor
              uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
              with:
                  version: 1.25.2
                  persona: pedantic
                  min-severity: informational
                  min-confidence: low
                  config: .github/zizmor.yml
            - name: Fail if zizmor reported findings
              env:
                  SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
              run: |
                  count="$(jq '[.runs[].results[]] | length' "$SARIF_FILE")"
                  echo "zizmor findings: $count"
                  test "$count" -eq 0
